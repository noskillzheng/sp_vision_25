enemy_color: "red"
# enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: CPU
min_confidence: 0.3
use_traditional: true

#####-----ROI-----#####
roi:
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: 0
pitch_offset: 0
comming_angle: 55
leaving_angle: 20
decision_speed: 7
high_speed_delay_time: 0.0
low_speed_delay_time: 0.0

#####-----shooter参数-----#####
first_tolerance: 3
second_tolerance: 2
judge_distance: 2
auto_fire: true

#####-----工业相机参数-----#####
camera_name: "hikrobot"
exposure_ms: 2.5
gain: 16.9
vid_pid: ""

#####-----IMU安装旋转-----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

#####-----相机标定参数-----#####
camera_matrix: [1808.40, 0, 752.39, 0, 1807.39, 510.42, 0, 0, 1]
distort_coeffs: [-0.0799, 0.0997, -0.00134, -0.00071, 0]

#####-----手眼标定参数-----#####
R_camera2gimbal: [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal: [0.1572, 0.00675, 0.0528]

#####-----planner-----#####
fire_thresh: 0.003

max_yaw_acc: 500
Q_yaw: [1e2, 0]
R_yaw: [1]

max_pitch_acc: 100
Q_pitch: [1e2, 0]
R_pitch: [1]

#####-----buff_detector参数-----#####
model: "assets/yolo11_buff_int8.xml"

#####-----buff_aimer参数-----#####
fire_gap_time: 0.700
predict_time: 0.120
